name: White-Label Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      client:
        description: 'Client to build (clientA | clientB | all)'
        required: false
        default: 'all'

env:
  FLUTTER_VERSION: '3.32.0'

jobs:
  # ── Lint & Test ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

  # ── Android Build ────────────────────────────────────────────────────────────
  build-android:
    name: Android — ${{ matrix.client }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        client: [clientA, clientB]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK — ${{ matrix.client }}
        run: |
          flutter build apk \
            --flavor ${{ matrix.client }} \
            --dart-define=FLAVOR=${{ matrix.client }} \
            --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.client }}-apk
          path: build/app/outputs/flutter-apk/app-${{ matrix.client }}-release.apk
          retention-days: 14

  # ── iOS Build (macOS only) ───────────────────────────────────────────────────
  build-ios:
    name: iOS — ${{ matrix.client }}
    runs-on: macos-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        client: [clientA, clientB]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no-codesign) — ${{ matrix.client }}
        run: |
          flutter build ios \
            --flavor ${{ matrix.client }} \
            --dart-define=FLAVOR=${{ matrix.client }} \
            --release \
            --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.client }}-ios
          path: build/ios/iphoneos/Runner.app
          retention-days: 14

  # ── Build Summary ─────────────────────────────────────────────────────────────
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## White-Label Build Results" >> $GITHUB_STEP_SUMMARY
          echo "| Client  | Android | iOS |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| clientA | ${{ needs.build-android.result }} | ${{ needs.build-ios.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| clientB | ${{ needs.build-android.result }} | ${{ needs.build-ios.result }} |" >> $GITHUB_STEP_SUMMARY
